<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="icon" type="image/png" href="../Support page/spotify logo.jpg">
    <link rel="stylesheet" href="./login_page.css">
    <link rel="stylesheet" href="./login respons.css">
</head>
<body>
    <div class="container">
        <i class="fa-brands fa-spotify"></i>
        <h1>Welcome back</h1>
        <label for="email">Email address</label><br>
        <input type="email" id="email" name="email" placeholder="name@domain.com">
        <a href="../open page/open.html" target="_self">
            <button>Next</button>
        </a>
        <p class="or">or</p>
        <div class="box">
            <i class="fa-solid fa-mobile-button"></i>
            <p>Log in  with phone number</p>
        </div>
        <div class="box">
            <img src="./google logo.jpg" alt="google logo" 
            height="25px" width="25px" style="border-radius: 50%;">
            <p>Log in  with Google</p>
        </div>
        <div class="box">
            <i class="fa-solid fa-apple-whole"></i>
            <p>Log in with Apple</p>
        </div>
        <div class="log">
            <p>Don't have an account?</p>
           <a href="../signup page/signup_page.html" target="_self"> <h4>Sign up</h4> </a>
        </div>
        <small>This site is protected by reCAPTCHA
            and the Google <br>
            <span>Privacy Policy</span>
            and
            <span>Terms of Service</span>
            apply.
        </small>
    </div>
</body>
</html>
