<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - Spotify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="icon" type="image/png" href="../Support page/spotify logo.jpg">
    <link rel="stylesheet" href="./signup_page.css">
    <link rel="stylesheet" href="./signup_response.css">
</head>
<body>
    <div class="container">
        <i class="fa-brands fa-spotify"></i>
        <h1>Sign up to start listening</h1>
        <form action="#">
        <label for="email">Email address</label><br>
        <input type="email" id="email" name="email" placeholder="name@domain.com">
        <a href="../open page/open.html" target="_self">
            <input type="button" class="button" value="Next">
        </a>
        </form>
        <p class="or">or</p>
        <div class="box">
            <i class="fa-solid fa-mobile-button"></i>
            <p>Sign up with phone number</p>
        </div>
        <div class="box">
            <img src="./google logo.jpg" alt="google logo" 
            height="25px" width="25px" style="border-radius: 50%;">
            <p>Sign up with Google</p>
        </div>
        <div class="box">
            <i class="fa-solid fa-apple-whole"></i>
            <p>Sign up with Apple</p>
        </div>
        <div class="log">
            <p>Already have an account?</p>
            <a href="../login page/login_page.html" target="_self"><h4>Log in</h4></a>
        </div>
        <small>This site is protected by reCAPTCHA
            and the Google <br>
            <span>Privacy Policy</span>
            and
            <span>Terms of Service</span>
            apply.
        </small>
    </div>
</body>
</html>
